---
layout: default
title: リンク
---

<section>
  <h2 id="section-links">リンク</h2>
  <div class="content-card">
    <!-- 箇条書きのリスト（リンク集用） -->
    <ul class="link-list">
      <li class="link-item">
        <!-- ★追加：id="link-titech" を付けてプログラムから操作できるようにしました -->
        <a href="https://www.titech.ac.jp/" target="_blank" id="link-titech">東京科学大学</a>
      </li>
      <li class="link-item">
        <a href="https://arxiv.org/" target="_blank">arXiv</a>
      </li>
      <!-- ↑ ここを実際のリンク先に書き換えて増やしていけます -->
    </ul>
  </div>
</section>

<!-- リンクページ専用の翻訳プログラム -->
<script>
  // 言語データ
  const linksI18n = {
    ja: { section: "リンク", titech: "東京科学大学" },
    en: { section: "Links", titech: "Institute of Science Tokyo" }
  };

  document.addEventListener('DOMContentLoaded', () => {
    // URLからパラメータを取得
    const urlParams = new URLSearchParams(window.location.search);
    const currentLang = urlParams.get('lang') || 'ja';
    
    // 【重要】コンソールで今の言語を確認（F12キーで確認してください）
    console.log("現在の言語設定:", currentLang);

    // 翻訳処理を実行
    const sectionLinks = document.getElementById('section-links');
    if (sectionLinks && linksI18n[currentLang]) {
      sectionLinks.textContent = linksI18n[currentLang].section;
    }

    const linkTitech = document.getElementById('link-titech');
    if (linkTitech && linksI18n[currentLang]) {
      linkTitech.textContent = linksI18n[currentLang].titech;
    }
  });

  // 言語切り替えボタン（HTMLの <a data-lang="en">...</a> に反応する処理）
  document.querySelectorAll('.lang-dropdown a').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const lang = e.target.getAttribute('data-lang');
      // 現在のURLにパラメータを付けてリロード
      window.location.search = `?lang=${lang}`;
    });
  });
</script>
