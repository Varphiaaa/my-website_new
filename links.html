---
layout: default
title: リンク
---

<section>
  <h2 id="section-links">リンク</h2>
  <div class="content-card">
    <!-- 箇条書きのリスト（リンク集用） -->
    <ul class="link-list">
      <li class="link-item">
        <!-- ★追加：id="link-titech" を付けてプログラムから操作できるようにしました -->
        <a href="https://www.titech.ac.jp/" target="_blank" id="link-titech">東京科学大学</a>
      </li>
      <li class="link-item">
        <a href="https://arxiv.org/" target="_blank">arXiv</a>
      </li>
      <!-- ↑ ここを実際のリンク先に書き換えて増やしていけます -->
    </ul>
  </div>
</section>

<!-- リンクページ専用の翻訳プログラム -->
<script>
  // リンクページで使う言語データ
  const linksI18n = {
    ja: { 
      hero: "リンク", 
      section: "リンク",
      titech: "東京科学大学" // ★追加：日本語の表示名
    },
    en: { 
      hero: "Links", 
      section: "Links",
      titech: "Institute of Science Tokyo" // ★追加：英語の表示名
    }
  };

  document.addEventListener('DOMContentLoaded', () => {
    // URLから言語を取得
    const urlParams = new URLSearchParams(window.location.search);
    const currentLang = urlParams.get('lang') || 'ja';

    // セクション見出しの翻訳
    const sectionLinks = document.getElementById('section-links');
    if (sectionLinks) sectionLinks.textContent = linksI18n[currentLang].section;

    // ★追加：リンクテキストの翻訳
    const linkTitech = document.getElementById('link-titech');
    if (linkTitech) linkTitech.textContent = linksI18n[currentLang].titech;
  });
</script>
