<!-- リンクページ専用の翻訳プログラム -->
<script>
  // リンクページで使う言語データ
  const linksI18n = {
    ja: { 
      hero: "リンク", 
      section: "リンク" 
    },
    en: { 
      hero: "Links", 
      section: "Links" 
    }
  };

  document.addEventListener('DOMContentLoaded', () => {
    // URLから言語を取得
    const urlParams = new URLSearchParams(window.location.search);
    const currentLang = urlParams.get('lang') || 'ja';

    // ヒーロー部分のタイトルの翻訳
    const heroTitle = document.getElementById('hero-title');
    if (heroTitle) heroTitle.textContent = linksI18n[currentLang].hero;

    // セクション見出しの翻訳
    const sectionLinks = document.getElementById('section-links');
    if (sectionLinks) sectionLinks.textContent = linksI18n[currentLang].section;
  });
</script>
