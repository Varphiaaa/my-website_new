        ]
      }
    }
  };

  // 講演リストをHTMLとして生成する関数
  function renderTalks(talks, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;

    const groups = talks.reduce((acc, talk) => {
      if (!acc[talk.year]) acc[talk.year] = [];
      acc[talk.year].push(talk);
      return acc;
    }, {});

    const sortedYears = Object.keys(groups).sort((a, b) => b - a);
    let currentStartNumber = talks.length;

    container.innerHTML = sortedYears.map(year => {
      const talksInYear = groups[year];
      const html = `
        <div class="year-section">
          <h3 class="year-header">${year}</h3>
          <ol class="talk-list" reversed start="${currentStartNumber}">
            ${talksInYear.map(t => `
              <li class="talk-item">
                <div><span class="talk-date">${t.date}:</span> <span class="talk-title">${t.title}</span></div>
                <div class="talk-details">${t.link ? `<a href="${t.link}" target="_blank">${t.details}</a>` : t.details}</div>
              </li>
            `).join('')}
          </ol>
        </div>
      `;
      currentStartNumber -= talksInYear.length;
      return html;
    }).join('');
  }

  // ページが読み込まれたらリストを生成
  document.addEventListener('DOMContentLoaded', () => {
    // URLから言語を取得
    const urlParams = new URLSearchParams(window.location.search);
    const currentLang = urlParams.get('lang') || 'ja';
    // ★追加：ヒーロータイトルの翻訳
    const heroTitle = document.getElementById('hero-title');
    if (heroTitle) heroTitle.textContent = talksI18n[currentLang].hero;
    // 見出しの翻訳
    const sectionUpcoming = document.getElementById('section-upcoming');
    if (sectionUpcoming) sectionUpcoming.textContent = talksI18n[currentLang].upcoming;
    
    const sectionPast = document.getElementById('section-past');
    if (sectionPast) sectionPast.textContent = talksI18n[currentLang].past;

    // リストの描画
    renderTalks(talksI18n[currentLang].talks.upcoming, 'upcoming-container');
    renderTalks(talksI18n[currentLang].talks.past, 'past-container');
  });
  
</script>
