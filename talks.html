  // 講演リストをHTMLとして生成する関数
  function renderTalks(talksJa, talksEn, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;

    // 日本語リストを基準に、対応する英語データを合体させてグループ化
    const groups = talksJa.reduce((acc, talk, index) => {
      if (!acc[talk.year]) acc[talk.year] = [];
      acc[talk.year].push({ ja: talk, en: talksEn[index] });
      return acc;
    }, {});

    const sortedYears = Object.keys(groups).sort((a, b) => b - a);
    let currentStartNumber = talksJa.length;

    container.innerHTML = sortedYears.map(year => {
      const talksInYear = groups[year];
      const html = `
        <div class="year-section">
          <h3 class="year-header">${year}</h3>
          <ol class="talk-list" reversed start="${currentStartNumber}">
            ${talksInYear.map(t => {
              const linkJa = t.ja.link ? `<a href="${t.ja.link}" target="_blank">${t.ja.details}</a>` : t.ja.details;
              const linkEn = t.en.link ? `<a href="${t.en.link}" target="_blank">${t.en.details}</a>` : t.en.details;
              
              // 1つの <li> の中に、日本語（.lang-ja）と英語（.lang-en）の両方を出力する
              return `
                <li class="talk-item">
                  <div>
                    <span class="talk-date">
                      <span class="lang-ja">${t.ja.date}</span><span class="lang-en">${t.en.date}</span>:
                    </span> 
                    <span class="talk-title">
                      <span class="lang-ja">${t.ja.title}</span><span class="lang-en">${t.en.title}</span>
                    </span>
                  </div>
                  <div class="talk-details">
                    <span class="lang-ja">${linkJa}</span><span class="lang-en">${linkEn}</span>
                  </div>
                </li>
              `;
            }).join('')}
          </ol>
        </div>
      `;
      currentStartNumber -= talksInYear.length;
      return html;
    }).join('');
  }

  // ページが読み込まれたらリストを生成
  document.addEventListener('DOMContentLoaded', () => {
    // ヒーロータイトルの翻訳対応
    const heroTitle = document.getElementById('hero-title');
    if (heroTitle) {
      heroTitle.innerHTML = `<span class="lang-ja">${talksI18n.ja.hero}</span><span class="lang-en">${talksI18n.en.hero}</span>`;
    }

    // URLのパラメータに依存せず、常に「日本語と英語の両方のデータ」を関数に渡して描画する
    renderTalks(talksI18n.ja.talks.upcoming, talksI18n.en.talks.upcoming, 'upcoming-container');
    renderTalks(talksI18n.ja.talks.past, talksI18n.en.talks.past, 'past-container');
  });
</script>
