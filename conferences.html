        ]
      }
    }
  };

  // リストをHTMLとして生成する関数
  function renderConferences(confJa, confEn, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;

    // 日本語リストを基準に、対応する英語データを合体させてグループ化
    const groups = confJa.reduce((acc, conf, index) => {
      if (!acc[conf.year]) acc[conf.year] = [];
      acc[conf.year].push({ ja: conf, en: confEn[index] });
      return acc;
    }, {});

    const sortedYears = Object.keys(groups).sort((a, b) => b - a);
    let currentStartNumber = confJa.length;

    container.innerHTML = sortedYears.map(year => {
      const confsInYear = groups[year];
      const html = `
        <div class="year-section">
          <h3 class="year-header">${year}</h3>
          <ol class="talk-list" reversed start="${currentStartNumber}">
            ${confsInYear.map(c => {
              // 参加集会ページでは、title（集会名）にリンクを付与する
              const linkJa = c.ja.link ? `<a href="${c.ja.link}" target="_blank">${c.ja.title}</a>` : c.ja.title;
              const linkEn = c.en.link ? `<a href="${c.en.link}" target="_blank">${c.en.title}</a>` : c.en.title;
              
              // 1つの <li> の中に、日本語（.lang-ja）と英語（.lang-en）の両方を出力する
              return `
                <li class="talk-item">
                  <div>
                    <span class="talk-date">
                      <span class="lang-ja">${c.ja.date}</span><span class="lang-en">${c.en.date}</span>:
                    </span> 
                    <span class="talk-title">
                      <span class="lang-ja">${linkJa}</span><span class="lang-en">${linkEn}</span>
                    </span>
                  </div>
                  <div class="talk-details">
                    <!-- detailsには開催場所（大学名など）を表示 -->
                    <span class="lang-ja">${c.ja.details}</span><span class="lang-en">${c.en.details}</span>
                  </div>
                </li>
              `;
            }).join('')}
          </ol>
        </div>
      `;
      currentStartNumber -= confsInYear.length;
      return html;
    }).join('');
  }

  // ページが読み込まれたらリストを生成
  document.addEventListener('DOMContentLoaded', () => {
    // ヒーロータイトルの翻訳対応
    const heroTitle = document.getElementById('hero-title');
    if (heroTitle) {
      heroTitle.innerHTML = `<span class="lang-ja">${attendedI18n.ja.hero}</span><span class="lang-en">${attendedI18n.en.hero}</span>`;
    }

    // URLのパラメータに依存せず、常に「日本語と英語の両方のデータ」を関数に渡して描画する
    renderConferences(attendedI18n.ja.conferences.upcoming, attendedI18n.en.conferences.upcoming, 'upcoming-container');
    renderConferences(attendedI18n.ja.conferences.past, attendedI18n.en.conferences.past, 'past-container');
  });
</script>
